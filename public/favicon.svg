<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e1e1e"/>
      <stop offset="100%" stop-color="#080808"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffe97a"/>
      <stop offset="40%" stop-color="#f6c90e"/>
      <stop offset="100%" stop-color="#a86c00"/>
    </linearGradient>
    <linearGradient id="gold2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff4b0"/>
      <stop offset="50%" stop-color="#f6c90e"/>
      <stop offset="100%" stop-color="#7a4e00"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ececec"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.9"/>
    </filter>
    <filter id="cardsh">
      <feDropShadow dx="3" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.7"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="90" fill="url(#bg)"/>
  <!-- Gold border -->
  <rect x="8" y="8" width="496" height="496" rx="84" fill="none" stroke="url(#gold)" stroke-width="6"/>

  <!-- ── 2 CARDS behind trophy ── -->
  <!-- Left card (As de coeur) rotated -22deg -->
  <g transform="translate(182,260) rotate(-22)" filter="url(#cardsh)">
    <rect x="-52" y="-80" width="104" height="150" rx="10" fill="url(#card)" stroke="#ccc" stroke-width="1.5"/>
    <!-- Top left A -->
    <text x="-36" y="-54" font-size="36" font-family="Georgia,serif" fill="#cc0000" font-weight="bold">A</text>
    <text x="-36" y="-18" font-size="30" font-family="Georgia,serif" fill="#cc0000">&#9829;</text>
    <!-- Center big suit -->
    <text x="0" y="30" font-size="70" font-family="Georgia,serif" fill="#cc0000" text-anchor="middle">&#9829;</text>
  </g>

  <!-- Right card (As de pique) rotated +22deg -->
  <g transform="translate(330,260) rotate(22)" filter="url(#cardsh)">
    <rect x="-52" y="-80" width="104" height="150" rx="10" fill="url(#card)" stroke="#ccc" stroke-width="1.5"/>
    <!-- Top left A -->
    <text x="-36" y="-54" font-size="36" font-family="Georgia,serif" fill="#111" font-weight="bold">A</text>
    <text x="-36" y="-18" font-size="30" font-family="Georgia,serif" fill="#111">&#9824;</text>
    <!-- Center big suit -->
    <text x="0" y="30" font-size="70" font-family="Georgia,serif" fill="#111" text-anchor="middle">&#9824;</text>
  </g>

  <!-- ── CHIP STACK (center-left of trophy base) ── -->
  <g transform="translate(118,390)">
    <ellipse cx="0" cy="0"   rx="38" ry="12" fill="#b00"    stroke="#fff" stroke-width="2" stroke-dasharray="7,5"/>
    <ellipse cx="0" cy="-16" rx="38" ry="12" fill="#111"    stroke="#fff" stroke-width="2" stroke-dasharray="7,5"/>
    <ellipse cx="0" cy="-32" rx="38" ry="12" fill="#b00"    stroke="#fff" stroke-width="2" stroke-dasharray="7,5"/>
    <ellipse cx="0" cy="-48" rx="38" ry="12" fill="#1a6b1a" stroke="#fff" stroke-width="2" stroke-dasharray="7,5"/>
    <ellipse cx="0" cy="-64" rx="38" ry="12" fill="#111"    stroke="#fff" stroke-width="2" stroke-dasharray="7,5"/>
    <ellipse cx="0" cy="-80" rx="38" ry="12" fill="#1a6b1a" stroke="#fff" stroke-width="2" stroke-dasharray="7,5"/>
  </g>

  <!-- ── TROPHY (front, center) ── -->
  <g transform="translate(256,270)" filter="url(#sh)">
    <!-- Base plate -->
    <rect x="-55" y="102" width="110" height="15" rx="5" fill="url(#gold2)"/>
    <!-- Stem connector -->
    <rect x="-40" y="88" width="80" height="18" rx="4" fill="url(#gold)"/>
    <!-- Stem -->
    <rect x="-14" y="55" width="28" height="38" fill="url(#gold)"/>
    <!-- Cup body -->
    <path d="M-72,-78 Q-84,10 -58,55 L58,55 Q84,10 72,-78 Z" fill="url(#gold2)"/>
    <!-- Cup shine -->
    <path d="M-58,-72 Q-68,10 -44,51 L44,51 Q68,10 58,-72 Z" fill="url(#gold)" opacity="0.45"/>
    <!-- Handles -->
    <path d="M-72,-44 Q-112,-44 -112,4 Q-112,46 -72,46" fill="none" stroke="url(#gold2)" stroke-width="17" stroke-linecap="round"/>
    <path d="M72,-44 Q112,-44 112,4 Q112,46 72,46"   fill="none" stroke="url(#gold2)" stroke-width="17" stroke-linecap="round"/>
    <!-- Team 78 label shadow -->
    <text x="1" y="-22" font-size="22" font-family="Arial Black,sans-serif" font-weight="900"
      fill="#3a1500" text-anchor="middle" opacity="0.5">Team 78</text>
    <!-- Team 78 label -->
    <text x="0" y="-24" font-size="22" font-family="Arial Black,sans-serif" font-weight="900"
      fill="white" text-anchor="middle">Team 78</text>
  </g>

</svg>
